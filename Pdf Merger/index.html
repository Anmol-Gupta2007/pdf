<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Load pdf-lib for Merging PDFs -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <div class="container">
            <header>
                <h1>✨ PDF Merger</h1>
                <p>Upload multiple PDFs and merge them into a single file.</p>
            </header>
            
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="application/pdf" multiple style="display: none;">
                <button class="upload-btn" id="choose-btn">Choose PDFs</button>
                <p>or drag and drop your files here</p>
            </div>

            <div id="actions-container" style="display: none;">
                <button id="merge-btn" class="merge-btn">⬇️ Merge Selected PDFs</button>
            </div>

            <div id="output-container" class="output-grid">
                <!-- Selected PDF cards will appear here -->
            </div>
        </div>
    </div>

    <!-- Processing Modal -->
    <div class="modal" id="processing-modal">
        <div class="modal-content">
            <div class="loader"></div>
            <h2>Merging...</h2>
            <p>Please wait while we combine your files.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
